# \u5E94\u7528\u540D\u79F0
spring.application.name=Coffee-Order-System

# \u6570\u636E\u5E93\u8FDE\u63A5\u914D\u7F6E
spring.datasource.url=jdbc:mysql://localhost:3306/CoffeeOrderSystem
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=000000

# MyBatis\u914D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.lihao.CoffeeOrderSystem.entity
mybatis.configuration.map-underscore-to-camel-case=true

# \u914D\u7F6EMybatis\u7684\u65E5\u5FD7\u8F93\u51FA
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# \u9759\u6001\u8D44\u6E90\u914D\u7F6E
spring.web.resources.static-locations=classpath:/static/,file:./static/,file:./src/main/resources/static/

# \u670D\u52A1\u5668\u7AEF\u53E3\uFF08\u9ED8\u8BA48080\uFF0C\u53EF\u4E0D\u6539\uFF09
server.port=8080